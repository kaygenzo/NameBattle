version: 2.1

orbs:
  android: circleci/android@2.5.0

executors:
  android:
    docker:
      - image: cimg/android:2026.07.1
    resource_class: large

commands:
  setup:
    steps:
      - checkout
      - run:
          name: Ensure Java 21
          command: |
            if java -version 2>&1 | grep -q "version \"21"; then
              echo "Java 21 already present"
            else
              sudo apt-get update -qq
              sudo apt-get install -y openjdk-21-jdk
              echo 'export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64' >> "$BASH_ENV"
              echo 'export PATH=$JAVA_HOME/bin:$PATH' >> "$BASH_ENV"
              source "$BASH_ENV"
            fi
            java -version
      - run:
          name: Initialize all configuration files
          command: |
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
            echo $KEYSTORE_FILE | base64 -d > telen.release.jks
            echo $PLAY_STORE_CREDENTIALS | base64 -d > play-store-credentials.json
      - android/restore-gradle-cache

  install-fastlane:
    steps:
      - restore_cache:
          keys:
            - gems-v1-{{ checksum "Gemfile" }}
            - gems-v1-
      - run:
          name: Install Ruby gems
          command: |
            bundle config set path 'vendor/bundle'
            bundle install
      - save_cache:
          key: gems-v1-{{ checksum "Gemfile" }}
          paths:
            - vendor/bundle

  cleanup:
    steps:
      - run:
          name: Delete sensitive files
          command: |
            rm -f telen.release.jks
            rm -f app/google-services.json
            rm -f play-store-credentials.json
          when: always

# Nightly at 02:00 CET (Paris winter = UTC+1).
# CircleCI cron is always UTC, so during CEST (summer, UTC+2) this fires at 03:00 Paris time.
workflows:
  nightly:
    triggers:
      - schedule:
          cron: "0 1 * * *"
          filters:
            branches:
              only:
                - develop
    jobs:
      - unit-tests
      - build-android-tests:
          requires:
            - unit-tests
      - build-debug:
          requires:
            - build-android-tests

  pipeline-branch:
    jobs:
      - unit-tests
      - build-android-tests:
          requires:
            - unit-tests
      - build-prod:
          requires:
            - build-android-tests

  pipeline-tag:
    jobs:
      - build-prod:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - deploy-alpha:
          requires:
            - build-prod
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

jobs:
  build-debug:
    executor: android
    steps:
      - setup
      - run:
          name: Assemble debug APK
          command: ./gradlew assembleDebug
      - android/save-gradle-cache
      - store_artifacts:
          path: app/build/outputs/apk/debug
      - cleanup

  build-prod:
    executor: android
    steps:
      - setup
      - run:
          name: Assemble release APK
          command: ./gradlew assembleRelease
      - android/save-gradle-cache
      - store_artifacts:
          path: app/build/outputs/apk/release
      - cleanup

  deploy-alpha:
    executor: android
    environment:
      FASTLANE_SKIP_UPDATE_CHECK: "true"
      FASTLANE_HIDE_CHANGELOG: "true"
    steps:
      - setup
      - install-fastlane
      - run:
          name: Deploy release AAB on Play Store
          command: |
            ./gradlew bundleRelease
            bundle exec fastlane deploy_to_alpha
      - android/save-gradle-cache
      - store_artifacts:
          path: app/build/outputs/mapping/release/mapping.txt
          destination: release/mapping.txt
      - cleanup

  unit-tests:
    executor: android
    steps:
      - setup
      - run:
          name: Run unit tests
          command: ./gradlew testDebugUnitTest
      - android/save-gradle-cache
      - store_test_results:
          path: app/build/test-results
      - store_artifacts:
          path: app/build/reports/tests/testDebugUnitTest
      - cleanup

  build-android-tests:
    executor: android
    steps:
      - setup
      - run:
          name: Build Android instrumentation tests APK
          command: ./gradlew assembleDebug assembleDebugAndroidTest
      - android/save-gradle-cache
      - store_artifacts:
          path: app/build/outputs/apk/androidTest/debug
      - cleanup
